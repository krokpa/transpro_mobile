name: transpro_mobile
description: "TransPro CI - Application mobile"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.1

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # HTTP
  dio: ^5.7.0

  # Secure storage (JWT)
  flutter_secure_storage: ^9.2.4

  # QR Scanner
  mobile_scanner: ^6.0.5

  # QR Code display
  qr_flutter: ^4.1.0

  # Date formatting
  intl: ^0.20.2

  # Share sheet
  share_plus: ^10.1.4

  # Real-time WebSocket (Socket.IO)
  socket_io_client: ^3.0.0

  # Map & URL
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1

  # Driver GPS
  geolocator: ^13.0.2

  # Offline cache (billets / QR codes)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Biometric auth (fingerprint / Face ID)
  local_auth: ^2.3.0

  # Image picker (avatar upload)
  image_picker: ^1.1.2

  # PIN hashing
  crypto: ^3.0.3

  # GeniusPay — paiement natif (Wave, Orange Money, MTN, Moov, carte)
  geniuspay_flutter: ^1.0.0

  # Splash screen natif (Android 12+ SplashScreen API)
  flutter_native_splash: ^2.4.3

  # Push notifications
  onesignal_flutter: ^5.2.8
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

  # Local notifications + campagnes périodiques
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  generate: true
  uses-material-design: true

  assets:
    - assets/images/transpro-logo.png
    - assets/images/transpro-logo-transparent.png
    - assets/images/transpro-horizontal.png
    - assets/images/transpro-story.png
    - assets/images/payments/

# ── Launcher icon ──────────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: launcher_icon
  ios: true
  image_path: assets/images/transpro-logo.png
  min_sdk_android: 21
  adaptive_icon_background: "#F97316"
  adaptive_icon_foreground: assets/images/transpro-logo-transparent.png
  web:
    generate: false

# ── Splash screen ──────────────────────────────────────────────────────────────
flutter_native_splash:
  color: "#F97316"
  image: assets/images/transpro-logo-transparent.png
  color_dark: "#0F172A"
  image_dark: assets/images/transpro-logo-transparent.png
  android: true
  ios: true
  web: false
  android_12:
    image: assets/images/transpro-logo-transparent.png
    icon_background_color: "#F97316"
    image_dark: assets/images/transpro-logo-transparent.png
    icon_background_color_dark: "#0F172A"
